# language-map.conf — extension -> language mapping
# One mapping per line: ext=language
# Lines starting with # are comments.
# Case-insensitive; extensions are matched on lowercase.

# Web / Frontend
js=javascript
jsx=javascript
ts=typescript
tsx=typescript
vue=vue
html=html
css=css
scss=scss
less=less

# Java / JVM
java=java
kt=kotlin
kts=kotlin
properties=properties
mf=manifest
# Special file name MANIFEST.MF will be normalized to 'manifest'

# Config / Data
xml=xml
yml=yaml
yaml=yaml
json=json
env=dotenv
ini=ini
conf=config
docker-compose.yml=docker_compose
.gitlab-ci.yml=gitlab_ci
.circleci/config.yml=circleci
skaffold.yaml=skaffold
kustomization.yaml=kustomize
chart.yaml=helm
chart.yml=helm

# Backends / Others
go=go
py=python
rs=rust
cs=csharp
php=php
swift=swift
dart=dart
c=c
h=c
cpp=cpp
cc=cpp
cxx=cpp
sql=sql
sh=shell
bash=shell
zsh=shell
ps1=powershell
md=markdown
tf=terraform
